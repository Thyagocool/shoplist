services:
  postgres:
    image: postgres:16-alpine
    container_name: shoplist-postgres
    environment:
      POSTGRES_DB: shoplist
      POSTGRES_USER: shoplist
      POSTGRES_PASSWORD: shoplist123
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoplist"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: shoplist-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api-uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://shoplist:shoplist123@postgres:5432/shoplist
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - UPLOAD_DIR=./uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: shoplist-app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    restart: unless-stopped

volumes:
  pg-data:
  api-uploads:
