version: '3.9'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: shoplist-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api-data:/app/data
      - api-uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shoplist.db
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - UPLOAD_DIR=./uploads
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: shoplist-app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    restart: unless-stopped

volumes:
  api-data:
  api-uploads:
